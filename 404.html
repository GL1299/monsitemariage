<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page introuvable — Mon Site Mariage</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#FAF8F3;--dark:#2C1F14;--gold:#C4954A;--brown:#6B4F2E;--border:#E8D5B0}
    body{font-family:'DM Sans',sans-serif;font-weight:300;background:var(--cream);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
    .label{font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:18px}
    h1{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,8vw,84px);font-weight:400;margin-bottom:18px}
    p{font-size:16px;color:var(--brown);margin-bottom:36px;max-width:440px;line-height:1.7}
    .btn-gold{display:inline-block;padding:14px 36px;background:var(--gold);color:#FFF;font-size:13px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;text-decoration:none;transition:background .2s}
    .btn-gold:hover{background:#A87B38}
  </style>
</head>
<body>
  <div class="label">Erreur 404</div>
  <h1>Page introuvable</h1>
  <p>Cette page n'existe pas ou plus. Retournez à l'accueil pour découvrir nos templates et nos tarifs.</p>
  <a href="/" class="btn-gold">Retour à l'accueil</a>
</body>
</html>
